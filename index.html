<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1c6ce5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Color Cove" />
    <title>Color Cove</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="Assets/90_Valentines.PNG" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <header class="topbar" role="banner">
        <button id="backBtn" class="icon-btn" type="button" aria-label="Back to gallery" hidden>
          <span aria-hidden="true">←</span>
          <span>Gallery</span>
        </button>
        <h1 id="titleText" class="title">Color Cove</h1>
        <div class="topbar-actions">
          <button id="zoomOutBtn" class="icon-btn" type="button" aria-label="Zoom out" hidden>-</button>
          <button id="zoomInBtn" class="icon-btn" type="button" aria-label="Zoom in" hidden>+</button>
        </div>
      </header>

      <main class="main" id="mainContent">
        <section id="galleryView" class="gallery-view" aria-label="Coloring pages gallery">
          <div class="gallery-head">
            <h2>Pick a Page</h2>
            <p>Tap any page to start coloring.</p>
          </div>
          <div id="galleryGrid" class="gallery-grid" role="list"></div>
        </section>

        <section id="editorView" class="editor-view" hidden aria-label="Coloring editor">
          <div id="viewport" class="viewport" aria-label="Artwork viewport">
            <div id="artworkLayer" class="artwork-layer">
              <canvas id="displayCanvas" aria-label="Coloring artwork"></canvas>
            </div>
            <div id="loadingOverlay" class="loading-overlay" hidden>
              <div class="loader-card" role="status" aria-live="polite">
                <div class="skeleton skeleton-art"></div>
                <p>Loading page...</p>
              </div>
            </div>
          </div>
          <p id="statusMsg" class="status-msg" aria-live="polite"></p>
        </section>
      </main>

      <section id="toolbarDock" class="toolbar-dock" hidden aria-label="Coloring tools">
        <div class="tool-row">
          <button id="undoBtn" class="tool-btn" type="button" aria-label="Undo">↶<span>Undo</span></button>
          <button id="redoBtn" class="tool-btn" type="button" aria-label="Redo">↷<span>Redo</span></button>
          <button id="resetViewBtn" class="tool-btn" type="button" aria-label="Reset view">⌖<span>View</span></button>
          <button id="clearBtn" class="tool-btn danger" type="button" aria-label="Clear colors">✕<span>Clear</span></button>
          <button id="saveBtn" class="tool-btn accent" type="button" aria-label="Save PNG">⬇<span>Save</span></button>
        </div>

        <div class="palette-head">
          <div class="current-color-wrap" aria-label="Current color">
            <span>Color</span>
            <span id="currentColor" class="current-color-dot"></span>
          </div>
          <button class="tip-btn" type="button" data-tip-target="tipFill" aria-label="Fill tool help">i</button>
          <div id="tipFill" class="tip-popover" hidden>
            Tap inside a shape to fill it.
          </div>
        </div>

        <div id="palette" class="palette" role="list" aria-label="Color palette"></div>

        <div class="recent-wrap">
          <span>Recent</span>
          <button class="tip-btn" type="button" data-tip-target="tipRecent" aria-label="Recent colors help">i</button>
          <div id="tipRecent" class="tip-popover" hidden>
            Your last colors appear here.
          </div>
        </div>
        <div id="recentColors" class="recent-colors" aria-label="Recent colors"></div>

        <label class="custom-picker" for="customColorInput">
          <span>Custom</span>
          <input id="customColorInput" type="color" value="#ff5d8f" aria-label="Pick custom color" />
        </label>
      </section>
    </div>

    <section id="a2hsModal" class="a2hs-overlay" role="dialog" aria-modal="true" aria-label="Add to Home Screen" hidden>
      <div class="a2hs-modal">
        <h2>Add to Home Screen</h2>
        <p>For the best full-screen experience on iPhone:</p>
        <ol>
          <li>Tap <strong>Share</strong> in Safari.</li>
          <li>Tap <strong>Add to Home Screen</strong>.</li>
        </ol>
        <button id="closeA2hsBtn" class="tool-btn accent" type="button">Got it</button>
      </div>
    </section>

    <script src="storage.js"></script>
    <script src="zoom.js"></script>
    <script src="app.js"></script>
  </body>
</html>
